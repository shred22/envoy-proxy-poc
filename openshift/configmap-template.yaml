apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ${PROJECT_NAME}-envoy-configmap-template
  annotations:
    description: "Envoy sidecar ConfigMap for mTLS ingress/egress (gRPC + HTTP)"
objects:

# ─────────────────────────────────────────────────────────────────────────────
# Envoy main configuration
# ─────────────────────────────────────────────────────────────────────────────
- apiVersion: v1
  kind: ConfigMap
  metadata:
    name: ${PROJECT_NAME}-${BRANCH_NAME_HY}-envoy
    labels:
      app: ${PROJECT_NAME}
  data:
    # ── Main Envoy bootstrap ──────────────────────────────────────────────────
    envoy.yaml: |
      node:
        id: ${PROJECT_NAME}-envoy
        cluster: ${PROJECT_NAME}-cluster

      # Admin interface – localhost only, never exposed outside the Pod
      admin:
        address:
          socket_address:
            address: 127.0.0.1
            port_value: 9901

      layered_runtime:
        layers:
          - name: runtime-0
            admin_layer: {}

      static_resources:

        # ════════════════════════════════════════════════════════════════════
        # LISTENERS
        # ════════════════════════════════════════════════════════════════════

        listeners:

          # ──────────────────────────────────────────────────────────────────
          # [1] INGRESS LISTENER  port 8443
          #     Accepts inbound mTLS (HTTPS) from external callers.
          #     Terminates TLS, then forwards plain HTTP to Spring Boot on
          #     127.0.0.1:8080.
          #     mTLS peer cert is forwarded via x-forwarded-client-cert header
          #     so Spring Boot can inspect caller identity if needed.
          # ──────────────────────────────────────────────────────────────────
          - name: ingress_listener
            address:
              socket_address:
                address: 0.0.0.0
                port_value: 8443
            filter_chains:
              - transport_socket:
                  name: envoy.transport_sockets.tls
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                    require_client_certificate: true
                    common_tls_context:
                      tls_params:
                        tls_minimum_protocol_version: TLSv1_2
                        tls_maximum_protocol_version: TLSv1_3
                      tls_certificate_sds_secret_configs:
                        - name: server_cert
                          sds_config:
                            path_config_source:
                              path: /etc/envoy/sds/server_cert_sds.yaml
                              watched_directory:
                                path: /etc/envoy/certs
                            resource_api_version: V3
                      validation_context_sds_secret_config:
                        name: validation_context
                        sds_config:
                          path_config_source:
                            path: /etc/envoy/sds/validation_context_sds_secret.yaml
                            watched_directory:
                              path: /etc/envoy/certs
                          resource_api_version: V3
                filters:
                  - name: envoy.filters.network.http_connection_manager
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                      stat_prefix: ingress_http
                      codec_type: AUTO
                      use_remote_address: true
                      forward_client_cert_details: SANITIZE_SET
                      set_current_client_cert_details:
                        subject: true
                        dns: true
                        uri: true
                      access_log:
                        - name: envoy.access_loggers.stdout
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                            log_format:
                              json_format:
                                ts: "%START_TIME%"
                                direction: "ingress"
                                method: "%REQ(:METHOD)%"
                                path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                                status: "%RESPONSE_CODE%"
                                duration_ms: "%DURATION%"
                                upstream: "%UPSTREAM_HOST%"
                                peer_cn: "%DOWNSTREAM_PEER_SUBJECT%"
                      route_config:
                        name: ingress_route
                        virtual_hosts:
                          - name: springboot_app
                            domains: ["*"]
                            routes:
                              - match:
                                  prefix: "/"
                                route:
                                  cluster: springboot_cluster
                                  timeout: 30s
                                  retry_policy:
                                    retry_on: "gateway-error,connect-failure,retriable-4xx"
                                    num_retries: 3
                                    per_try_timeout: 10s
                                    retry_back_off:
                                      base_interval: 0.25s
                                      max_interval: 5s
                      http_filters:
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

          # ──────────────────────────────────────────────────────────────────
          # [2] EGRESS gRPC LISTENER  port 9090
          #     Spring Boot connects here over plain gRPC (h2c).
          #     Envoy wraps the call in mTLS before sending to the external
          #     gRPC service.
          # ──────────────────────────────────────────────────────────────────
          - name: egress_grpc_listener
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 9090
            filter_chains:
              - filters:
                  - name: envoy.filters.network.http_connection_manager
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                      stat_prefix: egress_grpc
                      codec_type: HTTP2
                      access_log:
                        - name: envoy.access_loggers.stdout
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                            log_format:
                              json_format:
                                ts: "%START_TIME%"
                                direction: "egress-grpc"
                                method: "%REQ(:METHOD)%"
                                path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                                status: "%RESPONSE_CODE%"
                                duration_ms: "%DURATION%"
                                upstream: "%UPSTREAM_HOST%"
                      route_config:
                        name: egress_grpc_route
                        virtual_hosts:
                          - name: grpc_backend
                            domains: ["*"]
                            routes:
                              - match:
                                  prefix: "/"
                                  grpc: {}
                                route:
                                  cluster: identity_service_cluster
                                  timeout: 60s
                                  retry_policy:
                                    retry_on: "reset,connect-failure,retriable-status-codes"
                                    retriable_status_codes: [14]
                                    num_retries: 3
                                    per_try_timeout: 20s
                                    retry_back_off:
                                      base_interval: 0.5s
                                      max_interval: 10s
                      http_filters:
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

          # ──────────────────────────────────────────────────────────────────
          # [3] EGRESS HTTP LISTENER  port 9091
          #     Spring Boot connects here over plain HTTP/1.1 or HTTP/2.
          #     Envoy wraps the call in mTLS before sending to an external
          #     REST API.
          # ──────────────────────────────────────────────────────────────────
          - name: egress_http_listener
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 9091
            filter_chains:
              - filters:
                  - name: envoy.filters.network.http_connection_manager
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                      stat_prefix: egress_http
                      codec_type: AUTO
                      access_log:
                        - name: envoy.access_loggers.stdout
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                            log_format:
                              json_format:
                                ts: "%START_TIME%"
                                direction: "egress-http"
                                method: "%REQ(:METHOD)%"
                                path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                                status: "%RESPONSE_CODE%"
                                duration_ms: "%DURATION%"
                                upstream: "%UPSTREAM_HOST%"
                      route_config:
                        name: egress_http_route
                        virtual_hosts:
                          - name: external_rest_api
                            domains: ["*"]
                            routes:
                              - match:
                                  prefix: "/"
                                route:
                                  cluster: external_rest_cluster
                                  timeout: 30s
                                  retry_policy:
                                    retry_on: "gateway-error,connect-failure,retriable-4xx"
                                    num_retries: 3
                                    per_try_timeout: 10s
                                    retry_back_off:
                                      base_interval: 0.25s
                                      max_interval: 5s
                      http_filters:
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

        # ════════════════════════════════════════════════════════════════════
        # CLUSTERS
        # ════════════════════════════════════════════════════════════════════

        clusters:

          # ──────────────────────────────────────────────────────────────────
          # Spring Boot app running in the same Pod (no TLS, loopback)
          # ──────────────────────────────────────────────────────────────────
          - name: springboot_cluster
            type: STATIC
            connect_timeout: 5s
            load_assignment:
              cluster_name: springboot_cluster
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address:
                            address: 127.0.0.1
                            port_value: 8080
            circuit_breakers:
              thresholds:
                - priority: DEFAULT
                  max_connections: 100
                  max_pending_requests: 100
                  max_requests: 1000
                  max_retries: 3
                - priority: HIGH
                  max_connections: 200
                  max_pending_requests: 200
                  max_requests: 2000
                  max_retries: 5
            health_checks:
              - timeout: 3s
                interval: 10s
                unhealthy_threshold: 3
                healthy_threshold: 2
                http_health_check:
                  path: /actuator/health

          # ──────────────────────────────────────────────────────────────────
          # External gRPC identity service (mTLS egress)
          # ──────────────────────────────────────────────────────────────────
          - name: identity_service_cluster
            type: STRICT_DNS
            connect_timeout: 5s
            lb_policy: ROUND_ROBIN
            dns_refresh_rate: 30s
            dns_lookup_family: V4_ONLY
            typed_extension_protocol_options:
              envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
                "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
                explicit_http_config:
                  http2_protocol_options: {}
            load_assignment:
              cluster_name: identity_service_cluster
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address:
                            address: ${GRPC_SERVICE_HOST}
                            port_value: 443
            transport_socket:
              name: envoy.transport_sockets.tls
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
                sni: ${GRPC_SERVICE_HOST}
                common_tls_context:
                  tls_params:
                    tls_minimum_protocol_version: TLSv1_2
                    tls_maximum_protocol_version: TLSv1_3
                  tls_certificate_sds_secret_configs:
                    - name: client_cert
                      sds_config:
                        path_config_source:
                          path: /etc/envoy/sds/client_cert_sds.yaml
                          watched_directory:
                            path: /etc/envoy/certs
                        resource_api_version: V3
                  validation_context_sds_secret_config:
                    name: validation_context
                    sds_config:
                      path_config_source:
                        path: /etc/envoy/sds/validation_context_sds_secret.yaml
                        watched_directory:
                          path: /etc/envoy/certs
                      resource_api_version: V3
            circuit_breakers:
              thresholds:
                - priority: DEFAULT
                  max_connections: 50
                  max_pending_requests: 50
                  max_requests: 500
                  max_retries: 3
            health_checks:
              - timeout: 3s
                interval: 10s
                unhealthy_threshold: 3
                healthy_threshold: 2
                grpc_health_check: {}

          # ──────────────────────────────────────────────────────────────────
          # External REST API (mTLS egress)
          # ──────────────────────────────────────────────────────────────────
          - name: external_rest_cluster
            type: STRICT_DNS
            connect_timeout: 5s
            lb_policy: ROUND_ROBIN
            dns_refresh_rate: 30s
            dns_lookup_family: V4_ONLY
            load_assignment:
              cluster_name: external_rest_cluster
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address:
                            address: ${REST_SERVICE_HOST}
                            port_value: 443
            transport_socket:
              name: envoy.transport_sockets.tls
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
                sni: ${REST_SERVICE_HOST}
                common_tls_context:
                  tls_params:
                    tls_minimum_protocol_version: TLSv1_2
                    tls_maximum_protocol_version: TLSv1_3
                  tls_certificate_sds_secret_configs:
                    - name: client_cert
                      sds_config:
                        path_config_source:
                          path: /etc/envoy/sds/client_cert_sds.yaml
                          watched_directory:
                            path: /etc/envoy/certs
                        resource_api_version: V3
                  validation_context_sds_secret_config:
                    name: validation_context
                    sds_config:
                      path_config_source:
                        path: /etc/envoy/sds/validation_context_sds_secret.yaml
                        watched_directory:
                          path: /etc/envoy/certs
                      resource_api_version: V3
            circuit_breakers:
              thresholds:
                - priority: DEFAULT
                  max_connections: 50
                  max_pending_requests: 50
                  max_requests: 500
                  max_retries: 3
            health_checks:
              - timeout: 3s
                interval: 10s
                unhealthy_threshold: 3
                healthy_threshold: 2
                http_health_check:
                  path: /health

    # ── SDS: server certificate (ingress listener) ────────────────────────
    # One secret per file — path-based SDS rejects files with multiple entries.
    server_cert_sds.yaml: |
      resources:
        - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
          name: server_cert
          tls_certificate:
            certificate_chain:
              filename: /etc/envoy/certs/tls.crt
            private_key:
              filename: /etc/envoy/certs/tls.key

    # ── SDS: client certificate (egress clusters) ─────────────────────────
    client_cert_sds.yaml: |
      resources:
        - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
          name: client_cert
          tls_certificate:
            certificate_chain:
              filename: /etc/envoy/certs/tls.crt
            private_key:
              filename: /etc/envoy/certs/tls.key

    # ── SDS: CA bundle for peer validation (ingress + egress) ────────────
    validation_context_sds_secret.yaml: |
      resources:
        - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
          name: validation_context
          validation_context:
            trusted_ca:
              filename: /etc/envoy/certs/ca.crt

parameters:
  - name: BRANCH_NAME_HY
    required: true
  - name: PROJECT_NAME
    required: false
    value: envoy-poc
  - name: GRPC_SERVICE_HOST
    required: true
    description: "Hostname of the external gRPC service (no scheme, no port)"
  - name: REST_SERVICE_HOST
    required: true
    description: "Hostname of the external REST API (no scheme, no port)"

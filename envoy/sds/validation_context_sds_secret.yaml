resources:
  # CA bundle – used to verify peer certificates (both ingress client certs
  # and upstream server certs for egress mTLS).
  - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
    name: validation_context
    validation_context:
      trusted_ca:
        filename: /etc/envoy/certs/ca.crt
